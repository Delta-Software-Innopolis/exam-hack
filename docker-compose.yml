services:
  db:
    image: postgres:15-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  migration:
    build:
      context: ./quiz_hub
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      - DEBUG=${DEBUG}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
  quiz_hub:
    build: 
      context: ./quiz_hub
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG}
    ports:
      - 8000:8000
    depends_on:
      migration:
        condition: service_completed_successfully
  quiz_core:
    build: ./quiz_core/
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "8080:8080"
    depends_on:
      migration:
        condition: service_completed_successfully
  front-dev:
    build: 
      context: ./frontend/
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - path: ./frontend/src
          target: /app/src
          action: sync
        - path: ./frontend/package.json
          target: /app/package.json
          action: restart
        - path: ./frontend/vite.config.js
          target: /app/vite.config.js
          action: restart
    depends_on:
      - quiz_core
      - quiz_hub
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      # CORS
      - CORS_ADDRS=${CORS_ADDRS}

      # JWT
      - SECRET_FILE=${AUTH_PRIVATE_KEY_FILE}

      # Postgres
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
volumes:
  db-data: