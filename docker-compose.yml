services:

  db:
    image: postgres:15-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  migration:
    build: ./quiz_hub
    command: alembic upgrade head
    environment:
      - DEBUG=${DEBUG}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    depends_on:
      db:
        condition: service_healthy

  quizhub:
    build: 
      context: ./quiz_hub
      dockerfile: Dockerfile
    environment:
      - DEBUG=${DEBUG}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - 8000:8000
    depends_on:
      migration:
        condition: service_completed_successfully

  quizcore:
    build: ./quiz_core
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - JWT_PUBLIC_KEY_FILE=${JWT_PUBLIC_KEY_FILE}
    ports:
      - 8001:8001
    depends_on:
      db:
        condition: service_healthy
 
  auth:
    build: ./auth
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      - SECRET_FILE=${AUTH_PRIVATE_KEY_FILE}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - 8081:8081
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - VITE_AUTH_URL_DEV=${VITE_AUTH_URL_DEV}
    ports:
      - 8080:8080
    depends_on:
      - quizcore
      - quizhub
      - auth

volumes:
  db-data:
