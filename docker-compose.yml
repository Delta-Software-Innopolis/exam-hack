services:

  quizhub-db:
    image: postgres:15-alpine
    volumes:
      - quizhub-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${QUIZHUB_POSTGRES_USER}
      - POSTGRES_DB=${QUIZHUB_POSTGRES_DB}
      - POSTGRES_PASSWORD=${QUIZHUB_POSTGRES_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUIZHUB_POSTGRES_USER} -d ${QUIZHUB_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  quizcore-db:
    image: postgres:15-alpine
    volumes:
      - quizcore-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${QUIZCORE_POSTGRES_USER}
      - POSTGRES_DB=${QUIZCORE_POSTGRES_DB}
      - POSTGRES_PASSWORD=${QUIZCORE_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUIZCORE_POSTGRES_USER} -d ${QUIZCORE_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  quizhub-migration:
    build:
      context: ./quiz_hub
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      - DEBUG=${DEBUG}

      - POSTGRES_HOST=${QUIZHUB_POSTGRES_HOST}
      - POSTGRES_USER=${QUIZHUB_POSTGRES_USER}
      - POSTGRES_DB=${QUIZHUB_POSTGRES_DB}
      - POSTGRES_PASSWORD=${QUIZHUB_POSTGRES_PASSWORD}
      - POSTGRES_PORT=${QUIZHUB_POSTGRES_PORT}
    depends_on:
      quizhub-db:
        condition: service_healthy

  quizhub:
    build: 
      context: ./quiz_hub
      dockerfile: Dockerfile
    environment:
      - DEBUG=${DEBUG}

      - POSTGRES_HOST=${QUIZHUB_POSTGRES_HOST}
      - POSTGRES_USER=${QUIZHUB_POSTGRES_USER}
      - POSTGRES_DB=${QUIZHUB_POSTGRES_DB}
      - POSTGRES_PASSWORD=${QUIZHUB_POSTGRES_PASSWORD}
      - POSTGRES_PORT=${QUIZHUB_POSTGRES_PORT}
    ports:
      - 8000:8000
    depends_on:
      quizhub-migration:
        condition: service_completed_successfully

  quizcore:
    build: ./quiz_core/
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      
      - POSTGRES_HOST=${QUIZCORE_POSTGRES_HOST}
      - POSTGRES_USER=${QUIZCORE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${QUIZCORE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${QUIZCORE_POSTGRES_DB}
      - POSTGRES_PORT=${QUIZCORE_POSTGRES_PORT}
    ports:
      - 8081:8080
    depends_on:
      quizcore-db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - 8080:8080
    depends_on:
      - quizcore
      - quizhub

volumes:
  quizhub-db-data:
  quizcore-db-data:
