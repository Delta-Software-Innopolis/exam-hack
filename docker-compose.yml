services:

  db:
    image: postgres:15-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  migration:
    build: ./quiz_hub
    command: alembic upgrade head
    environment:
      - DEBUG=${DEBUG}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    depends_on:
      db:
        condition: service_healthy

  quizhub:
    build: 
      context: ./quiz_hub
      dockerfile: Dockerfile
    environment:
      - DEBUG=${DEBUG}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - 8000:8000
    depends_on:
      migration:
        condition: service_completed_successfully

  llm-service:
    build:
      context: .
      dockerfile: ./llm-service/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost',7000); c.request('GET','/health'); r=c.getresponse(); assert r.status==200, r.status"]
      interval: 10s
      timeout: 5s
      retries: 5

  quizcore:
    build: ./quiz_core
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      - LLM_SERVICE_URL=${LLM_SERVICE_URL:-http://llm-service:7000}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - JWT_PUBLIC_KEY_FILE=${JWT_PUBLIC_KEY_FILE}
    ports:
      - 8001:8001
    depends_on:
      db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
 
  auth:
    build: ./auth
    environment:
      - CORS_ADDRS=${CORS_ADDRS}
      - IS_HTTPS=${AUTH_IS_HTTPS}
      - SECRET_FILE=${AUTH_PRIVATE_KEY_FILE}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - 8081:8081
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - VITE_AUTH_URL_DEV=${VITE_AUTH_URL_DEV}
      - VITE_CORE_URL_DEV=${VITE_CORE_URL_DEV}
    ports:
      - 8080:8080
    depends_on:
      - quizcore
      - quizhub
      - auth

volumes:
  db-data:
