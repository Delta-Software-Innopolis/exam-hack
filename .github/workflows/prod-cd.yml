name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

          - image: auth
            context: ./auth
            dockerfile: ./auth/Dockerfile

          - image: quizcore
            context: ./quizcore
            dockerfile: ./quizcore/Dockerfile

          - image: quizhub
            context: ./quizhub
            dockerfile: ./quizhub/Dockerfile

          - image: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/delta-software-innopolis/exam-hack/${{ matrix.image }}:latest
            ghcr.io/delta-software-innopolis/exam-hack/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/exam-hack
            make pull ENV=prod
            make prod

