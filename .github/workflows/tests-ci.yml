name: Tests

on:
  push:
    branches:
      - main

jobs:
  auth-tests:
    name: Auth Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: auth/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...

  quiz-core-tests:
    name: Quiz Core Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: quiz_core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: quiz_core/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...

  frontend-tests:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
