name: Deploy to test environment in VPS

on:
  push:
    branches:
      - test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy test via SSH and run compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/exam-hack-test
            git pull origin test
            docker compose -p test down
            docker compose -p test -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test up -d --build
